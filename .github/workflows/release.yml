name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: verify
        run: |
          test -z "$(gofmt -l .)"
          go vet ./...
          go test ./...
          go build -o clickup-axi .
          ./clickup-axi skill --check
      - name: build binaries
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}" arch="${target#*/}"
            out="dist/clickup-axi_${os}_${arch}"
            [ "$os" = windows ] && out="$out.exe"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w -X github.com/JanSuthacheeva/clickup-axi/internal/version.Version=$version" -o "$out" .
          done
          (cd dist && sha256sum -- * > SHA256SUMS)
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
